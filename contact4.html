<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - StudioX</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body class="bg-slate-50">
    <nav class="bg-white shadow-sm">
      <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between">
        <h1 class="text-2xl font-bold text-indigo-600">StudioX</h1>

        <div class="flex gap-6">
          <a href="index.html">Home</a>
          <a href="about4.html">About</a>
          <a href="portfolio.html">Portfolio</a>
          <a href="contact4.html" class="text-indigo-600">Contact</a>
        </div>
      </div>
    </nav>

    <section class="max-w-4xl mx-auto px-6 py-20">
      <h1 class="text-5xl font-bold text-center mb-12">Contact Us</h1>

      <form class="bg-white p-8 rounded-2xl shadow space-y-6">
        <div>
          <label class="block mb-2">Name</label>
          <input
            type="text"
            class="w-full border rounded-lg p-3"
            placeholder="Your Name"
          />
        </div>

        <div>
          <label class="block mb-2">Email</label>
          <input
            type="email"
            class="w-full border rounded-lg p-3"
            placeholder="Your Email"
          />
        </div>

        <div>
          <label class="block mb-2">Subject</label>
          <input
            type="text"
            class="w-full border rounded-lg p-3"
            placeholder="Subject"
          />
        </div>

        <div>
          <label class="block mb-2">Message</label>
          <textarea
            rows="5"
            class="w-full border rounded-lg p-3"
            placeholder="Write your message"
          ></textarea>
        </div>

        <button
          type="submit"
          class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700"
        >
          Send Message
        </button>
      </form>
    </section>

    <footer class="bg-slate-900 text-white text-center py-8">
      © 2026 StudioX. All Rights Reserved.
    </footer>
  </body>
</html>
